# Influence TV Network streaming server — nginx + nginx-rtmp.
# Deploy to /etc/nginx/nginx.conf on the streaming droplet (Ubuntu 24.04,
# libnginx-mod-rtmp + ffmpeg installed). API base assumed at localhost:3000.

# This file REPLACES the whole nginx.conf, so it does not pull in
# /etc/nginx/modules-enabled/* — load the RTMP module explicitly.
load_module modules/ngx_rtmp_module.so;

user www-data;
worker_processes auto;
events { worker_connections 2048; }

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        # ── Live ingest (creators / control room push here) ──
        application live {
            live on;
            record off;

            # Verify stream key against the API. Non-200 rejects the publish.
            on_publish       http://localhost:3000/api/streams/verify;
            on_publish_done  http://localhost:3000/api/streams/ended;

            # Create the HLS output dirs, then build the master playlist.
            exec_publish /usr/local/bin/apex-hls-init.sh $name;
            exec_publish /usr/local/bin/apex-create-master.sh $name;

            # 2-rung ladder sized for the 2-vCPU droplet (3×3-rung 1080p melted
            # it: load 10+, starved encoders). Restore the 1080p rung here AND
            # in apex-create-master.sh when the droplet is resized.
            exec_push ffmpeg -i rtmp://localhost/live/$name
                -c:a aac -b:a 128k -c:v libx264 -preset superfast -tune zerolatency -profile:v main
                -b:v 1500k -s 1280x720 -f hls -hls_time 4 -hls_list_size 10
                -hls_flags delete_segments+append_list /var/www/hls/$name/720p/index.m3u8
                -c:a aac -b:a 96k -c:v libx264 -preset superfast -tune zerolatency -profile:v main
                -b:v 600k -s 854x480 -f hls -hls_time 4 -hls_list_size 10
                -hls_flags delete_segments+append_list /var/www/hls/$name/480p/index.m3u8;
        }

        # ── VOD playout target (PlayoutEngine pushes 24/7 channels here) ──
        # 2-rung ABR ladder matching the master playlist that
        # apex-create-master.sh writes (1500k/600k). Channel URLs point at
        # master.m3u8 (migration 017). Sized for the 2-vCPU droplet — the
        # 3-rung 1080p ladder saturated it (load 10+, news channel starved).
        # Restore the 1080p block here AND in apex-create-master.sh after a
        # droplet resize.
        application vod {
            live on;
            record off;
            # Ensure the HLS output dirs exist before exec_push ffmpeg writes.
            exec_publish /usr/local/bin/apex-hls-init.sh $name;
            exec_publish /usr/local/bin/apex-create-master.sh $name;
            exec_push ffmpeg -i rtmp://localhost/vod/$name
                -c:a aac -b:a 128k -c:v libx264 -preset superfast -profile:v main
                -b:v 1500k -s 1280x720 -f hls -hls_time 4 -hls_list_size 10
                -hls_flags delete_segments+append_list /var/www/hls/$name/720p/index.m3u8
                -c:a aac -b:a 96k -c:v libx264 -preset superfast -profile:v main
                -b:v 600k -s 854x480 -f hls -hls_time 4 -hls_list_size 10
                -hls_flags delete_segments+append_list /var/www/hls/$name/480p/index.m3u8;
        }
    }
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;

    server {
        listen 80;

        # HLS output — no-cache for live segments, permissive CORS.
        location /hls/ {
            root /var/www;
            add_header Cache-Control no-cache always;
            add_header Access-Control-Allow-Origin * always;
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
        }

        # RTMP statistics.
        location /stat {
            rtmp_stat all;
        }
    }
}
