# Apex streaming server — nginx + nginx-rtmp.
# Deploy to /etc/nginx/nginx.conf on the streaming EC2 (Ubuntu 22.04,
# libnginx-mod-rtmp + ffmpeg installed). API base assumed at localhost:3000.

user www-data;
worker_processes auto;
events { worker_connections 2048; }

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        # ── Live ingest (creators / control room push here) ──
        application live {
            live on;
            record off;

            # Verify stream key against the API. Non-200 rejects the publish.
            on_publish       http://localhost:3000/api/streams/verify;
            on_publish_done  http://localhost:3000/api/streams/ended;

            # Build the master playlist once publishing starts.
            exec_publish /usr/local/bin/apex-create-master.sh $name;

            # Transcode the incoming stream into a 3-rendition HLS ladder.
            exec_push ffmpeg -i rtmp://localhost/live/$name
                -c:a aac -b:a 128k -c:v libx264 -preset veryfast -tune zerolatency -profile:v baseline
                -b:v 2500k -s 1920x1080 -f hls -hls_time 4 -hls_list_size 10
                -hls_flags delete_segments+append_list /var/www/hls/$name/1080p/index.m3u8
                -c:a aac -b:a 128k -c:v libx264 -preset veryfast -tune zerolatency -profile:v baseline
                -b:v 1500k -s 1280x720 -f hls -hls_time 4 -hls_list_size 10
                -hls_flags delete_segments+append_list /var/www/hls/$name/720p/index.m3u8
                -c:a aac -b:a 96k -c:v libx264 -preset veryfast -tune zerolatency -profile:v baseline
                -b:v 600k -s 854x480 -f hls -hls_time 4 -hls_list_size 10
                -hls_flags delete_segments+append_list /var/www/hls/$name/480p/index.m3u8;
        }

        # ── VOD playout target (PlayoutEngine pushes 24/7 channels here) ──
        application vod {
            live on;
            record off;
            exec_push ffmpeg -i rtmp://localhost/vod/$name
                -c:a aac -b:a 128k -c:v libx264 -preset veryfast -profile:v baseline
                -b:v 2000k -f hls -hls_time 4 -hls_list_size 10
                -hls_flags delete_segments+append_list /var/www/hls/$name/index.m3u8;
        }
    }
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;

    server {
        listen 80;

        # HLS output — no-cache for live segments, permissive CORS.
        location /hls/ {
            root /var/www;
            add_header Cache-Control no-cache always;
            add_header Access-Control-Allow-Origin * always;
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
        }

        # RTMP statistics.
        location /stat {
            rtmp_stat all;
        }
    }
}
