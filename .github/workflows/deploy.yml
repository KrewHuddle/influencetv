name: Deploy Apex

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from package.json "packageManager" — do not pin here
      # (double-specifying triggers ERR_PNPM_BAD_PM_VERSION).
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build first (turbo ^build order: @apex/shared → api → web). This also
      # typechecks every package — a bare `tsc -r` would fail because
      # @apex/shared has no dist yet.
      - name: Build
        run: pnpm build
      - name: Tests
        run: pnpm test

  # Deploy the API + web to the DigitalOcean API droplet.
  deploy-api:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH (DigitalOcean droplet)
        uses: appleboy/ssh-action@v1.0.3
        env:
          # NEXT_PUBLIC_* vars are inlined at web BUILD time — forward the
          # Stripe publishable key from a GitHub secret into the remote build.
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PK }}
        with:
          host: ${{ secrets.DO_API_DROPLET_IP }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
          script: |
            cd /root/apex
            git pull origin main
            pnpm install --frozen-lockfile
            pnpm --filter @apex/api build
            export NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY="${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}"
            pnpm --filter @apex/web build
            pm2 restart apex-api || pm2 start packages/api/dist/index.js --name apex-api
            pm2 restart apex-web || pm2 start "pnpm --filter @apex/web start" --name apex-web

  # Push updated nginx-rtmp config to the streaming droplet + reload.
  deploy-streaming:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Update streaming droplet over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_STREAMING_DROPLET_IP }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /root/apex
            git pull origin main
            cp streaming/nginx.conf /etc/nginx/nginx.conf
            cp streaming/apex-create-master.sh /usr/local/bin/apex-create-master.sh
            chmod +x /usr/local/bin/apex-create-master.sh
            nginx -t && systemctl reload nginx
