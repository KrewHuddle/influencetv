services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: apex
      POSTGRES_PASSWORD: apex_dev_password
      POSTGRES_DB: apex_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  valkey:
    image: valkey/valkey:7.2-alpine
    ports:
      - "6379:6379"

  localstack:
    image: localstack/localstack
    environment:
      SERVICES: s3,ses
      DEFAULT_REGION: us-east-1
    ports:
      - "4566:4566"

volumes:
  postgres_data:
